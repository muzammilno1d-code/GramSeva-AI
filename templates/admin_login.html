<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - GramSeva AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            rgba(0,0,0,0.55),
            rgba(0,0,0,0.55)
            ),
            url('/static/images/village-bg.jpg');

            background-size:cover;
            background-position:center;
        }

        .login-box{

            width:420px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(10px);

            border-radius:20px;

            padding:40px;

            text-align:center;

            box-shadow:0 8px 30px rgba(0,0,0,0.3);

            color:white;
        }

        .login-box h1{

            margin-bottom:10px;

            font-size:32px;
        }

        .login-box p{

            margin-bottom:25px;

            color:#dddddd;
        }

        input{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            margin-bottom:20px;

            font-size:16px;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#2ecc71;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#27ae60;
            transform:translateY(-2px);
        }

        .logo{

            font-size:55px;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="logo">🔐</div>

    <h1>Admin Portal</h1>

    <p>GramSeva AI Management Dashboard</p>

    <form action="/admin-auth" method="POST">

        <input
            type="password"
            name="password"
            placeholder="Enter Admin Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
